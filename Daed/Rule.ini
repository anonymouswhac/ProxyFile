# ---- 底层规则 ----
# 1. 系统底层与局域网放行（必须放最上面，防止断网与死循环）
pname(dnsmasq) -> must_direct
dip(224.0.0.0/3, 255.255.255.255/32) -> direct
dip(geoip:private) -> direct

# ---- AI 规则 ----
# 2. 核心自定义代理规则（抢在大陆直连前捕获流量，防止 DNS 污染）
domain(geosite:openai, geosite:anthropic, geosite:xai, geosite:perplexity) -> ai
domain(keyword: chatgpt, gemini, claude, grok, copilot, perplexity) -> ai

# ---- 加密货币 ----
domain(geosite:okx, geosite:binance, geosite:bybit) -> coin
domain(keyword: bitget, stake) -> coin

# ---- 社交规则 ----
domain(geosite:twitter) -> social
dip(geoip:twitter) -> social
domain(geosite:telegram) -> social
dip(geoip:telegram) -> social

# ---- 游戏规则 ----
# 严格遵循：下载 CDN 在前直连，网页/商店在后代理
domain(geosite:steam@cn) -> direct
domain(geosite:steam@cdn) -> direct
domain(geosite:steam) -> outside
domain(suffix: wargaming.net) -> outside

# ---- 常用海外网站 ----
domain(suffix: hdhive.com) -> outside
domain(geosite: tmdb) -> outside
domain(suffix: cloudflare.com) -> outside

# ---- 测速规则 ----
domain(suffix: test-ipv6.com) -> direct
domain(keyword: test-ipv6) -> direct

# ---- 大陆直连 ----
# 3. 兜底直连（前方的海外/核心规则未命中时， mainland 流量在此处直连）
domain(geosite:cn) -> direct
dip(geoip:cn) -> direct

# ---- 兜底规则 ----
fallback: outside
